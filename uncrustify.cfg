# Indentation
indent_columns = 2
indent_with_tabs = 0
indent_class = true

# Spacing
sp_after_semi_for = force
sp_arith = force
sp_assign = force
sp_bool = force
sp_compare = force
sp_func_call_paren = remove
sp_func_proto_paren = remove

# Code Look
nl_fdef_brace = add
nl_enum_brace = add
nl_struct_brace = add
nl_if_brace = add
nl_else_brace = add
nl_for_brace = add
nl_while_brace = add
code_width = 100