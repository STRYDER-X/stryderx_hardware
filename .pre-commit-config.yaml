repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
    args: ['--maxkb=500']
  - id: check-merge-conflict
  - id: detect-private-key
- repo: https://github.com/pre-commit/mirrors-autopep8
  rev: v2.0.4
  hooks:
  - id: autopep8
    args: ['--in-place', '--aggressive']

- repo: local
  hooks:
  - id: check-todos
    name: Check for bare TODOs and FIXMEs
    entry: grep -nHIRE "\b(todo|fixme)\b"
    language: system
    files: \.(hpp|cpp|h|c|py|cmake)|CMakeLists\.txt$
  - id: uncrustify
    name: Hardware Linter (Uncrustify)
    entry: ament_uncrustify --reformat -c ./cmake/.uncrustify.cfg
    language: system
    files: \.(hpp|cpp|h|c)$
